[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "pycomfy"
version = "0.1.0"
description = "ComfyUI inference engine as a standalone Python library (no server, no UI)."
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[tool.setuptools.packages.find]
include = ["pycomfy*"]

[tool.uv]
# This project uses uv for install, lock, and run. See README and AGENTS.md.

[tool.pytest.ini_options]
testpaths = ["tests"]
